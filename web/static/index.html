<!DOCTYPE html>
<html lang="en">
<head>

    <title>Wafflerace</title>
    <style>

            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8f1e3;
            color: #3f2a1d;
            display: flex;
            align-items: center;
            justify-content: center;

    <div class="container">
        <img src="/assets/logo.png" alt="Wafflerace" class="logo">

</html>
