name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Robust branch check for releases.
    # We deliberately do NOT rely on github.event.base_ref for tag pushes
    # because it is unreliable. Instead we do a real git history check.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # required for the branch containment check below

      - name: Validate release must come from dev
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/dev'; then
            echo "::error::Release tags are only allowed from the 'dev' branch."
            echo "The commit this tag (${{ github.ref_name }}) points to does not exist on origin/dev."
            echo ""
            echo "Branches that contain this commit:"
            git branch -r --contains ${{ github.sha }} || true
            exit 1
          fi
          echo "✅ Tag commit is on dev — proceeding with release."

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download Go modules
        run: go mod download

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CSS
        run: bun run build:css

      - name: Generate Templ
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          go install golang.org/x/tools/cmd/goimports@latest
          templ generate
          goimports -w internal/templates/

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o wafflerace ./cmd/server

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            wafflerace
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false
          sbom: false