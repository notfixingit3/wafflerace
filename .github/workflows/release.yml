name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Native GitHub branch awareness for tags.
    # Only runs when the tag was created while on the 'dev' branch.
    # Note: github.event.base_ref is not 100% reliable in all tag scenarios
    # (see docs + community reports), but this is the simplest native approach.
    if: github.event.base_ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download Go modules
        run: go mod download

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CSS
        run: bun run build:css

      - name: Generate Templ
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          go install golang.org/x/tools/cmd/goimports@latest
          templ generate
          goimports -w internal/templates/

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o wafflerace ./cmd/server

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            wafflerace
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}