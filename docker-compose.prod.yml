version: "3.8"

# =============================================================================
# Wafflerace - Production (Traefik-aware)
# =============================================================================
#
# This file defines ONLY the application service + the Traefik labels it needs.
#
# ASSUMPTION:
# You are expected to already have your own Traefik (and optionally CrowdSec)
# running, along with an external Docker network called "proxy".
#
# Docker images are published to GitHub Container Registry on every release:
#   ghcr.io/notfixingit3/wafflerace:<version>
#   ghcr.io/notfixingit3/wafflerace:latest
#
# Recommended:
#   - Pin a specific version in production instead of using :latest
#   - Example: ghcr.io/notfixingit3/wafflerace:v0.1.12
#
# Also available:
#   ghcr.io/notfixingit3/wafflerace:dev       (bleeding edge from dev branch)
#   ghcr.io/notfixingit3/wafflerace:sha-xxxx  (exact commit pinning)
#
# Example usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# =============================================================================

services:
  app:
    # Use a pinned version in production (recommended)
    image: ghcr.io/notfixingit3/wafflerace:latest
    container_name: wafflerace
    restart: unless-stopped
    environment:
      - PORT=9090               # Port the app listens on inside the container
      - GIN_MODE=release        # Always release mode in production
      # Add any other environment variables your setup requires below
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # === Customize these for your Traefik setup ===
      - "traefik.http.routers.wafflerace.rule=Host(`wafflerace.example.com`)"
      - "traefik.http.routers.wafflerace.entrypoints=websecure"
      - "traefik.http.routers.wafflerace.tls.certresolver=letsencrypt"
      # Service port
      - "traefik.http.services.wafflerace.loadbalancer.server.port=9090"
      # Optional: If you have a CrowdSec middleware defined globally in your Traefik:
      # - "traefik.http.routers.wafflerace.middlewares=crowdsec@file"

networks:
  proxy:
    name: proxy
    external: true
