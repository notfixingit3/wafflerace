version: "3.8"

# =============================================================================
# Wafflerace - Production Environment (Traefik + Let's Encrypt + CrowdSec)
# =============================================================================
#
# PREREQUISITES / CUSTOMIZATION CHECKLIST
# ----------------------------------------
# Before running this file, you MUST update the following:
#
# [ ] 1. Let's Encrypt email
#        → Change: admin@projectsyrup.app  (line with acme.email)
#
# [ ] 2. Hostname / Domain
#        → Change: wafflerace.projectsyrup.app  (production domain)
#
# [ ] 3. External Docker network
#        → Default is "proxy". Create it if missing:
#          docker network create proxy
#
# [ ] 4. CrowdSec Bouncer API Key
#        → Replace: CHANGE_ME_WITH_BOUNCER_KEY
#        → How to generate:
#          docker compose -f docker-compose.prod.yml up -d crowdsec
#          docker exec crowdsec cscli bouncers add traefik-bouncer-prod
#
# [ ] 5. (Strongly recommended) Pin the container image version
#        → Change from :latest to a specific tag, e.g.:
#          ghcr.io/notfixingit3/wafflerace:v1.2.3
#
# [ ] 6. (Optional) Update Traefik dashboard hostname if desired.
#
# Full step-by-step instructions are in the big comment block below.
#
# =============================================================================

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@projectsyrup.app"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # CrowdSec bouncer middleware
      - "--providers.file.filename=/etc/traefik/dynamic/crowdsec.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.projectsyrup.app`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      # Protect Traefik dashboard with CrowdSec (recommended in prod)
      - "traefik.http.routers.traefik.middlewares=crowdsec@file"

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      - COLLECTIONS=crowdsecurity/traefik
      - GID=1000
    volumes:
      - ./crowdsec/config:/etc/crowdsec
      - ./crowdsec/data:/var/lib/crowdsec/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=false"

  crowdsec-bouncer:
    image: fbonalair/traefik-crowdsec-bouncer:0.3.0
    container_name: crowdsec-bouncer-prod
    restart: unless-stopped
    environment:
      - CROWDSEC_AGENT_HOST=crowdsec:8080
      # Get this key by running: docker exec crowdsec cscli bouncers add traefik-bouncer-prod
      - CROWDSEC_API_KEY=CHANGE_ME_WITH_BOUNCER_KEY
      - TRAEFIK_FORWARD_AUTH_URL=http://crowdsec-bouncer:8080/api/v1/forwardAuth
    depends_on:
      - crowdsec
    networks:
      - proxy
    labels:
      - "traefik.enable=false"

  app:
    image: ghcr.io/notfixingit3/wafflerace:latest
    container_name: wafflerace
    restart: unless-stopped
    environment:
      - PORT=9090
      - GIN_MODE=release
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Router
      - "traefik.http.routers.wafflerace.rule=Host(`wafflerace.projectsyrup.app`)"
      - "traefik.http.routers.wafflerace.entrypoints=websecure"
      - "traefik.http.routers.wafflerace.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.services.wafflerace.loadbalancer.server.port=9090"
      # CrowdSec protection
      - "traefik.http.routers.wafflerace.middlewares=crowdsec@file"

networks:
  proxy:
    name: proxy
    external: true
