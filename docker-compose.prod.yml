version: "3.8"

# =============================================================================
# Wafflerace - Production (Traefik-aware)
# =============================================================================
#
# This file defines ONLY the application service with the Traefik labels it needs.
#
# ASSUMPTION:
# You are expected to already have your own Traefik (and optionally CrowdSec)
# running and connected to an external network called "proxy".
#
# Customize the labels below for your domain and setup.
#
# Recommended: Pin the image version instead of using :latest.
#
# Example usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# =============================================================================

services:
  app:
    image: ghcr.io/notfixingit3/wafflerace:latest
    container_name: wafflerace
    restart: unless-stopped
    environment:
      - PORT=9090
      - GIN_MODE=release
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # === Customize these for your Traefik setup ===
      - "traefik.http.routers.wafflerace.rule=Host(`wafflerace.example.com`)"
      - "traefik.http.routers.wafflerace.entrypoints=websecure"
      - "traefik.http.routers.wafflerace.tls.certresolver=letsencrypt"
      # Service port
      - "traefik.http.services.wafflerace.loadbalancer.server.port=9090"
      # Optional: If you have a CrowdSec middleware defined globally in your Traefik:
      # - "traefik.http.routers.wafflerace.middlewares=crowdsec@file"

networks:
  proxy:
    name: proxy
    external: true
