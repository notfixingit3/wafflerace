version: "3.8"

# =============================================================================
# Wafflerace - Development (Traefik-aware)
# =============================================================================
#
# This file defines ONLY the application service + the Traefik labels it needs.
#
# ASSUMPTION:
# You are expected to already have your own Traefik (and optionally CrowdSec)
# running and connected to an external Docker network called "proxy".
#
# Docker images are published on every push to the `dev` branch as:
#   ghcr.io/notfixingit3/wafflerace:dev
#
# Two common ways to run during development:
#
#   1. Build locally (recommended when actively developing):
#      docker compose -f docker-compose.dev.yml up -d --build
#
#   2. Use the latest image from the dev branch (faster, no local build):
#      - Comment out the "build:" line below
#      - Uncomment the "image:" line that uses :dev
#
# The labels below tell your external Traefik how to route to the app.
# Customize the Host rule for your local/staging domain.
#
# =============================================================================

services:
  app:
    # Option A: Build locally (best when developing)
    build: .
    # Option B: Use the bleeding-edge dev image (no local build needed)
    # image: ghcr.io/notfixingit3/wafflerace:dev

    container_name: wafflerace-dev
    restart: unless-stopped
    environment:
      - PORT=9090
      - GIN_MODE=release
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # === Customize these for your Traefik setup ===
      - "traefik.http.routers.wafflerace-dev.rule=Host(`dev-wafflerace.example.com`)"
      - "traefik.http.routers.wafflerace-dev.entrypoints=websecure"
      - "traefik.http.routers.wafflerace-dev.tls.certresolver=letsencrypt"
      # Service port
      - "traefik.http.services.wafflerace-dev.loadbalancer.server.port=9090"
      # Optional: If you have a CrowdSec middleware defined in your Traefik:
      # - "traefik.http.routers.wafflerace-dev.middlewares=crowdsec@file"

networks:
  proxy:
    name: proxy
    external: true
